<!-- 
==============================
GRID RESPONSIVE NOTE
==============================

Problem:
Maine grid me ye likha tha:

grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));

Iska matlab:
Har card kam se kam 250px ka hoga.

Dikkat:
Agar screen 250px se chhoti ho gayi,
to card shrink nahi hoga.
Isliye layout toot sakta hai ya overflow aa sakta hai.

--------------------------------

Fix:

grid-template-columns:
repeat(auto-fit, minmax(min(250px, 100%), 1fr));

Isme:

min(250px, 100%)

ka matlab:
250px aur parent ki width me jo chhota ho,
wo use karo.

Example:

Parent = 600px
min(250px, 100%) = 250px

Parent = 180px
min(250px, 100%) = 180px

Isliye card chhoti screen me fit ho jata hai.

--------------------------------

Final Code:

.grid-container{
    display:grid;
    grid-template-columns:
    repeat(auto-fit, minmax(min(250px, 100%), 1fr));
    gap:15px;
}

.item{
    width:100%;
    min-width:0;
    padding:clamp(1rem, 2vw, 1.5rem);
}

--------------------------------

Line by line:

auto-fit:
Jitne cards fit ho sake, utne ek row me daal do.

minmax():
Card ki minimum aur maximum width define karta hai.

min(250px, 100%):
Normally card 250px ka rahega,
lekin agar parent 250px se chhota ho,
to parent ke hisaab se shrink ho jayega.

1fr:
Bachi hui space cards me divide ho jayegi.

width:100%:
Card apne grid column ki full width lega.

min-width:0:
Card ko shrink hone ki permission deta hai.
Text wrap ho jayega, card zabardasti bada nahi rahega.

padding:clamp():
Mobile pe padding kam,
desktop pe padding zyada.

--------------------------------

Main lesson:

minmax(250px, 1fr)
= card 250px se chhota nahi hoga.

minmax(min(250px,100%), 1fr)
= card normally 250px ka,
lekin chhoti screen pe shrink ho sakta hai.

Grid pagal nahi tha.
Wo meri hi instruction follow kar raha tha.
Bas maine usko zyada strict instruction de di thi.
-->

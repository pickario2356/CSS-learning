<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout</title>
    <link rel="stylesheet" href="hero2.css">
</head>
<body>
    <div class="hero">
        <div class="hero-container">
            <div class="hero-content">
                <p class="hero-h">🚀 AI Powered Learning</p>
                <h1>Study smarter with your AI study assistant</h1>
                <p class="hero-p">Generate notes, quizzes, summaries, and revision plans faster with one simple dashboard.</p>
                <div class="hero-btns">
                    <a href="#">Get Started</a>
                    <a class="first" href="#">Watch Demo</a>
                </div>
                <div class="special">
                    <div>10K+<span>students</span></div>
                    <div>92%<span>Accuracy</span></div>
                    <div>24/7<span>AI Tutor</span></div>
                </div>
            </div>
            <div class="hero-img">
                <p class="today">Today's Progress <span>82%</span></p>
                <div class="progress">
                    <div class="fill"></div>
                </div>
                <div class="inner">Physics notes<span>Done</span></div>
                <div class="inner">Quiz Practice<span>Ready</span></div>
                <div class="inner">AI Doubt Solver<span>ON</span></div>
            </div>
        </div>
    </div>
</body>
</html>
